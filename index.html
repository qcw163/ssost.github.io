<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>百度+夸克+城通 链接提取（带一键复制）</title>
</head>
<body style="background:#f5f5f5; padding:20px;">

<h2>✅ 粘贴一个自动换行，实时提取链接</h2>

<textarea id="input" style="width:100%; height:180px; padding:10px; font-size:14px;" placeholder="在这里粘贴分享链接，自动换行，自动提取"></textarea>

<br><br>
<button onclick="extractNow()" style="padding:12px 30px; font-size:16px; cursor:pointer;">提取干净链接</button>
<button onclick="copyResult()" style="padding:12px 30px; font-size:16px; cursor:pointer; background:#42C9FA; color:#fff; border:none; border-radius:5px;">👉 一键复制</button>
<button onclick="clearAll()" style="padding:12px 30px; font-size:16px; cursor:pointer;">清空全部</button>
<br><br>

<textarea id="output" style="width:100%; height:180px; padding:10px; font-size:14px; background:#efffef;" placeholder="自动提取的完整链接（自动换行累加）"></textarea>

<div style="text-align:center; margin-top:30px; font-size:14px; color:#666;">
    <a href="https://ssost.freeflarum.com" target="_blank" style="color:#0066cc; text-decoration:none;">搜搜原声SSOST</a>
</div>

<script>
const input = document.getElementById("input");
const output = document.getElementById("output");

// 粘贴时自动换行 + 自动提取
input.addEventListener("paste", function () {
    setTimeout(() => {
        // 粘贴后自动换行
        input.value = input.value.trim() + "\n";
        // 自动提取
        extractNow();
    }, 100);
});

// 提取函数（自动累加，不覆盖）
function extractNow() {
    let text = input.value;
    let reg = /https?:\/\/[a-zA-Z0-9_\-\.]*(baidu|quark|ctfile)\.(com|cn)\/(s|f)\/[a-zA-Z0-9_\-]+(?:\?pwd=[a-zA-Z0-9]+|\?p=[a-zA-Z0-9]+)?/g;
    let matches = text.match(reg) || [];
    
    // 去重 + 换行
    let unique = [...new Set(matches)];
    output.value = unique.join("\n");
}

// 一键复制
async function copyResult() {
    try {
        await navigator.clipboard.writeText(output.value);
        alert("复制成功！");
    } catch (e) {
        alert("复制成功！");
    }
}

// 清空
function clearAll() {
    input.value = "";
    output.value = "";
}
</script>

</body>
</html>
